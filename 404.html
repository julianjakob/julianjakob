<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Julian Jakob</title>
  <script>
    // GitHub Pages SPA fix — redirects sub-paths back to index.html
    // Stores the requested path in sessionStorage so the app can restore it
    var path = window.location.pathname;
    if (path && path !== '/') {
      sessionStorage.setItem('spa_redirect', path);
    }
    window.location.replace('/');
  </script>
</head>
<body></body>
</html>
